<!DOCTYPE html>
<html lang="en">
<head>
    <title>E-Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">MyStore</a>
        <div>
            {% if user.is_authenticated %}
                <a href="{% url 'cart' %}" class="btn btn-outline-light btn-sm">Cart</a>
                <a href="{% url 'order_history' %}" class="btn btn-outline-light btn-sm">Orders</a>
                <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Login</a>
            {% endif %}
        </div>
    </div>
</nav>
    <h1 class="text-center mt-5">Order Placed Successfully!</h1>
    <a href="/" class="btn btn-primary">Back to Home</a>
</body>
</html>
